<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ParkIQ — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #08080f;
    --surface: #11111c;
    --border:  #1e1e2e;
    --amber:   #f59e0b;
    --amber2:  #ea580c;
    --text:    #e4e4f0;
    --muted:   #6b6b8a;
    --danger:  #ef4444;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(245,158,11,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,158,11,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridDrift 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridDrift { from { transform: translateY(0); } to { transform: translateY(40px); } }

  /* Glow orb */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .login-box {
    position: relative;
    width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--amber);
    padding: 48px 40px;
    animation: slideUp 0.6s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -1px;
    margin-bottom: 4px;
  }
  .logo span { color: var(--amber); }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }
  input:focus { border-color: var(--amber); }

  .btn {
    width: 100%;
    background: var(--amber);
    color: #000;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
  }
  .btn:hover { background: var(--amber2); }
  .btn:active { transform: scale(0.98); }

  .error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--danger);
    font-size: 12px;
    padding: 10px 14px;
    margin-bottom: 20px;
  }

  .hint {
    margin-top: 24px;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 20px;
    line-height: 1.8;
  }
  .hint strong { color: var(--amber); }

  .corner {
    position: absolute;
    width: 16px; height: 16px;
    border-color: var(--amber);
    border-style: solid;
  }
  .corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
</style>
</head>
<body>
<div class="login-box">
  <div class="corner tl"></div>
  <div class="corner br"></div>

  <div class="logo">Park<span>IQ</span></div>
  <div class="tagline">Dynamic Pricing System</div>

  {% with msgs = get_flashed_messages() %}
    {% if msgs %}
      <div class="error">{{ msgs[0] }}</div>
    {% endif %}
  {% endwith %}

  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" placeholder="admin" autocomplete="username" required />

    <label>Password</label>
    <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required />

    <button class="btn" type="submit">→ Enter Dashboard</button>
  </form>

  <div class="hint">
    Demo credentials:<br>
    <strong>admin</strong> / <strong>admin123</strong><br>
    <strong>owner</strong> / <strong>owner123</strong>
  </div>
</div>
</body>
</html>
